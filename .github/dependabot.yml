version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "09:00"
      timezone: "America/Detroit"
    assignees:
      - "ihardy"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "security"
    groups:
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "npm"
    directory: "/environments/platform-resharex"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "09:00"
      timezone: "America/Detroit"
    assignees:
      - "ihardy"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "security"
    groups:
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
